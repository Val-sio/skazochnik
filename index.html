<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сказочник - Персональные сказки для детей</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* Сброс стилей */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 1s ease;
  color: #2c3e50;
}

/* Тематические фоны (меняются при выборе мира) */
body.world-kingdom { background: linear-gradient(135deg, #f5e6d3 0%, #d4af37 50%, #8b6914 100%); }
body.world-space { background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #2d1b69 100%); }
body.world-ocean { background: linear-gradient(135deg, #006994 0%, #00a8cc 50%, #40e0d0 100%); }
body.world-forest { background: linear-gradient(135deg, #2d5016 0%, #4a7c23 50%, #8fbc8f 100%); }
body.world-jungle { background: linear-gradient(135deg, #556b2f 0%, #6b8e23 50%, #9acd32 100%); }
body.world-city { background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 50%, #ce93d8 100%); }
body.default-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

/* Звёзды (для космоса и общего фона) */
.stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}
.star {
  position: absolute; background: white; border-radius: 50%;
  animation: twinkle 3s infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Главный контейнер */
.container {
  position: relative; z-index: 1;
  max-width: 800px; margin: 0 auto; padding: 20px;
  min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
}

/* Экраны (скрываем все, показываем активный) */
.screen { display: none; animation: fadeIn 0.5s ease; }
.screen.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Белая карточка */
.card {
  background: rgba(255, 255, 255, 0.95);
  border-radius: 24px; padding: 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(10px);
}

/* Заголовки */
.title {
  font-family: 'Comic Neue', cursive;
  font-size: 48px; font-weight: 700;
  text-align: center; margin-bottom: 10px; color: #2c3e50;
}
.subtitle {
  text-align: center; font-size: 18px;
  color: #7f8c8d; margin-bottom: 40px;
}
</style>
</head>
<body class="default-bg">

<!-- Фон со звёздами -->
<div class="stars" id="stars"></div>

<!-- Главный контейнер -->
<div class="container">
  
  <!-- Сюда будем добавлять экраны в следующей части -->
  <div class="screen active" id="testScreen">
    <div class="card">
      <h1 class="title">Сказочник</h1>
      <p class="subtitle">Часть 1 подключена! Фоны и шрифты работают.</p>
    </div>
  </div>

</div>

<script>
// Скрипт для создания звёзд на фоне
function initStars() {
  const starsContainer = document.getElementById('stars');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    const size = Math.random() * 3 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.animationDelay = Math.random() * 3 + 's';
    starsContainer.appendChild(star);
  }
}

// Запуск при загрузке
window.onload = function() {
  initStars();
};
</script>

</body>
</html>
